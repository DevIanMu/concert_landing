<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototype - 演唱会活动落地页状态机 Demo</title>
  <!--
    PROTOTYPE — delete when done
    Question: 演唱会 H5 落地页在不同用户状态下的信息架构与主行动点是否合理？
    Parameters:
      - 5 个用户状态：0访客 / 1已登录未开户 / 2已开户 / 4已报名 / 5已结束（状态 2 中通过资产滑块控制是否达标）
      - 用户档位由账户总资产自动判定：≥100 万 HKD 为 VIP 档，≥10 万 HKD 为标准档
      - 设计规范：根目录 design.md（Coinbase 风格：#0052ff 主色、pill 按钮、24px 卡片圆角、96px 节奏）
      - 参考视觉：其他活动落地页截图（移动端 H5、蓝色 KV、规则折叠、底部单一 CTA）
    How to use: 用左上角悬浮控制条切换状态并拖动资产，观察页面主行动点和档位信息变化。
  -->
  <style>
    :root {
      /* Coinbase tokens */
      --primary: #0052ff;
      --primary-active: #003ecc;
      --primary-disabled: #a8b8cc;
      --canvas: #ffffff;
      --surface-soft: #f7f7f7;
      --surface-strong: #eef0f3;
      --surface-dark: #0a0b0d;
      --surface-dark-elevated: #16181c;
      --hairline: #dee1e6;
      --hairline-soft: #eef0f3;
      --ink: #0a0b0d;
      --body: #5b616e;
      --muted: #7c828a;
      --muted-soft: #a8acb3;
      --on-primary: #ffffff;
      --on-dark: #ffffff;
      --on-dark-soft: #a8acb3;
      --semantic-up: #05b169;
      --semantic-down: #cf202f;
      --accent-gold: #c9a96e;
      --radius-pill: 100px;
      --radius-xl: 24px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --section: 96px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--surface-soft);
      color: var(--ink);
    }

    /* ========== 原型控制条 ========== */
    .prototype-controls {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 1000;
      background: var(--surface-dark-elevated);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      color: var(--on-dark);
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      max-width: 320px;
    }
    .prototype-controls h4 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--accent-gold);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .prototype-controls .control-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .prototype-controls label { color: var(--on-dark-soft); min-width: 52px; }
    .prototype-controls select,
    .prototype-controls input[type="range"] {
      flex: 1;
      background: var(--surface-dark);
      color: var(--on-dark);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-sm);
      padding: 4px 6px;
      font-size: 12px;
    }
    .prototype-controls .state-readout {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 12px;
      line-height: 1.5;
      color: var(--on-dark-soft);
    }
    .prototype-controls .state-readout strong { color: var(--on-dark); }

    /* ========== 手机外框 ========== */
    .phone-shell {
      max-width: 414px;
      margin: 24px auto 60px;
      background: var(--canvas);
      border-radius: 40px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.14);
      overflow: hidden;
      position: relative;
      min-height: calc(100vh - 48px);
    }

    /* ========== H5 页面 ========== */
    .h5-page {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      padding-bottom: 100px; /* CTA 固定高度占位 */
    }

    /* 顶部导航 */
    .h5-header {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: var(--canvas);
      border-bottom: 1px solid var(--hairline-soft);
    }
    .h5-header .back {
      position: absolute;
      left: 16px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink);
      font-size: 20px;
    }
    .h5-header .title {
      font-size: 17px;
      font-weight: 600;
      color: var(--ink);
    }

    .lang-switcher {
      height: 32px;
      padding: 0 12px;
      border: 1px solid var(--primary);
      border-radius: var(--radius-pill);
      background: var(--canvas);
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      outline: none;
    }
    .lang-switcher:focus {
      box-shadow: 0 0 0 2px rgba(0,82,255,0.2);
    }
    .h5-header .lang-switcher {
      position: absolute;
      right: 16px;
    }
    .hero .lang-switcher {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 2;
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.35);
      color: var(--on-dark);
      backdrop-filter: blur(4px);
    }
    .hero .lang-switcher:focus {
      box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
    }
    .hero .lang-switcher option {
      background: var(--canvas);
      color: var(--ink);
    }

    /* KV 头图 */
    .hero {
      position: relative;
      background: linear-gradient(135deg, #0a1628 0%, #1d4ed8 60%, #3b82f6 100%);
      color: var(--on-dark);
      padding: 32px 24px 40px;
      overflow: hidden;
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 90% 20%, rgba(255,255,255,0.16) 0%, transparent 40%);
      pointer-events: none;
    }
    .hero-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }
    .hero-brand .logo {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--on-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-weight: 700;
      font-size: 14px;
    }
    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 68%;
    }
    .hero h1 {
      font-size: 32px;
      font-weight: 400;
      line-height: 1.12;
      letter-spacing: -0.8px;
      margin-bottom: 14px;
    }
    .hero .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: var(--radius-pill);
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      backdrop-filter: blur(4px);
    }
    .hero-illustration {
      position: absolute;
      right: -20px;
      bottom: -24px;
      width: 180px;
      height: 180px;
      z-index: 1;
      opacity: 0.95;
    }
    .hero-illustration svg { width: 100%; height: 100%; }

    /* 内容区 */
    .content { padding: 24px 20px; }

    /* 状态徽章 */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: var(--radius-pill);
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .status-badge.qualified { background: rgba(5,177,105,0.1); color: var(--semantic-up); }
    .status-badge.unqualified { background: rgba(207,32,47,0.08); color: var(--semantic-down); }
    .status-badge.neutral { background: var(--surface-strong); color: var(--body); }

    /* 状态提示卡片 */
    .gap-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }
    .gap-row .gap { margin: 0; }
    .deposit-mini-btn {
      height: 36px;
      padding: 0 16px;
      border: none;
      border-radius: var(--radius-pill);
      background: var(--primary);
      color: var(--on-primary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }
    .state-card {
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-xl);
      padding: 22px;
      margin-bottom: 20px;
    }
    .state-card .state-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--ink);
    }
    .state-card .state-desc {
      font-size: 14px;
      line-height: 1.55;
      color: var(--body);
    }
    .state-card .asset-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 16px 0 4px;
      padding: 14px 16px;
      background: var(--surface-soft);
      border-radius: var(--radius-md);
    }
    .state-card .asset-row .label { font-size: 13px; color: var(--muted); }
    .state-card .asset-row .value { font-size: 22px; font-weight: 500; letter-spacing: -0.5px; }
    .state-card .gap {
      margin-top: 10px;
      font-size: 13px;
      color: var(--body);
    }
    .state-card .gap strong { color: var(--semantic-down); }

    /* 权益卡片区 */
    .benefits { margin-bottom: 24px; }
    .benefits-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 14px;
      color: var(--ink);
    }
    .benefit-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .benefit-item {
      background: var(--surface-soft);
      border: 1px solid var(--hairline-soft);
      border-radius: var(--radius-lg);
      padding: 18px 14px;
      text-align: center;
    }
    .benefit-item .icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 10px;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .benefit-item h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .benefit-item p {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    /* 场次列表 */
    .events-section { margin-bottom: 24px; }
    .events-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .events-header h3 { font-size: 18px; font-weight: 600; }
    .events-header .note {
      font-size: 12px;
      color: var(--muted);
    }
    .event-card {
      border: 1px solid var(--hairline);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 12px;
      background: var(--canvas);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .event-card.disabled {
      opacity: 0.55;
      background: var(--surface-soft);
    }
    .event-card.selected {
      border-color: var(--primary);
      box-shadow: 0 0 0 1px var(--primary);
    }
    .event-card .event-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .event-card .artist { font-size: 16px; font-weight: 600; }
    .event-card .date { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .event-card .stock {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: var(--radius-pill);
    }
    .event-card .stock.ok { background: rgba(5,177,105,0.1); color: var(--semantic-up); }
    .event-card .stock.low { background: rgba(244,176,0,0.12); color: #b45309; }
    .event-card .stock.out { background: var(--surface-strong); color: var(--muted); }
    .event-card .ticket-options {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .ticket-chip {
      flex: 1;
      border: 1px solid var(--hairline);
      border-radius: var(--radius-md);
      padding: 10px;
      text-align: center;
      cursor: pointer;
      font-size: 13px;
    }
    .ticket-chip:hover:not(.disabled) { border-color: var(--primary); }
    .ticket-chip.disabled {
      opacity: 0.45;
      cursor: not-allowed;
      background: var(--surface-soft);
    }
    .ticket-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    .ticket-chip .chip-line {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }
    .ticket-chip .chip-line .label { font-weight: 600; color: var(--ink); }
    .ticket-chip .chip-line .stock-count { font-size: 12px; color: var(--muted); }
    .ticket-chip .chip-note {
      font-size: 12px;
      color: var(--semantic-up);
      font-weight: 600;
    }
    .ticket-chip.disabled .chip-note { color: var(--muted-soft); }
    .ticket-chip.selected {
      border-color: var(--primary);
      background: rgba(0,82,255,0.08);
      position: relative;
    }
    .ticket-chip.selected::after {
      content: '✓';
      position: absolute;
      top: 4px;
      right: 6px;
      width: 16px;
      height: 16px;
      background: var(--primary);
      color: #fff;
      border-radius: 50%;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ticket-chip .chip-price {
      font-size: 12px;
      color: var(--muted);
    }

    /* 报名表单 */
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--ink);
    }
    .form-group input {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      border: 1px solid var(--hairline);
      border-radius: var(--radius-md);
      font-size: 15px;
      color: var(--ink);
      background: var(--canvas);
    }
    .form-group input:focus {
      outline: none;
      border: 2px solid var(--primary);
      padding-left: 15px;
    }
    .form-hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* 地址填写页面 */
    .address-page { padding: 0 20px 24px; }
    .address-page .page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .address-page .page-header .back {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--ink);
      cursor: pointer;
    }
    .address-page .page-header h2 {
      font-size: 20px;
      font-weight: 600;
    }
    .address-summary {
      background: var(--surface-soft);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 20px;
    }
    .address-summary .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .address-summary .value {
      font-size: 16px;
      font-weight: 600;
      color: var(--ink);
    }
    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }
    .form-row .form-select {
      height: 48px;
      padding: 0 12px;
      border: 1px solid var(--hairline);
      border-radius: var(--radius-md);
      font-size: 15px;
      color: var(--ink);
      background: var(--canvas);
      flex-shrink: 0;
    }
    .form-row .form-select:focus {
      outline: none;
      border: 2px solid var(--primary);
    }
    .form-row .form-input {
      flex: 1;
      height: 48px;
      padding: 0 16px;
      border: 1px solid var(--hairline);
      border-radius: var(--radius-md);
      font-size: 15px;
      color: var(--ink);
      background: var(--canvas);
    }
    .form-row .form-input:focus {
      outline: none;
      border: 2px solid var(--primary);
      padding-left: 15px;
    }
    .form-textarea {
      width: 100%;
      min-height: 80px;
      padding: 12px 16px;
      border: 1px solid var(--hairline);
      border-radius: var(--radius-md);
      font-size: 15px;
      color: var(--ink);
      background: var(--canvas);
      resize: vertical;
    }
    .form-textarea:focus {
      outline: none;
      border: 2px solid var(--primary);
      padding: 11px 15px;
    }
    .auto-fill-btn {
      width: 100%;
      height: 44px;
      border: 1px dashed var(--primary);
      border-radius: var(--radius-md);
      background: rgba(0,82,255,0.06);
      color: var(--primary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 20px;
    }

    /* 表单校验错误态 */
    .form-input.error,
    .form-textarea.error,
    .form-select.error {
      border-color: var(--semantic-down);
    }
    .form-input.error:focus,
    .form-textarea.error:focus,
    .form-select.error:focus {
      border-color: var(--semantic-down);
    }
    .error-msg {
      font-size: 12px;
      color: var(--semantic-down);
      margin-top: 6px;
      line-height: 1.4;
    }

    /* 活动规则 */
    .rules-section { margin-bottom: 24px; }
    .rules-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface-strong);
      border-radius: var(--radius-pill);
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
    }
    .rules-body {
      margin-top: 12px;
      padding: 16px 18px;
      background: var(--surface-soft);
      border-radius: var(--radius-lg);
      font-size: 13px;
      line-height: 1.7;
      color: var(--body);
      display: block;
    }
    .rules-body ol { padding-left: 18px; }
    .rules-body li { margin-bottom: 8px; }

    /* 物流时间线 */
    .timeline {
      position: relative;
      padding-left: 22px;
      margin-top: 14px;
    }
    .timeline::before {
      content: "";
      position: absolute;
      left: 6px;
      top: 6px;
      bottom: 6px;
      width: 2px;
      background: var(--hairline);
    }
    .timeline-item {
      position: relative;
      padding-bottom: 16px;
    }
    .timeline-item::before {
      content: "";
      position: absolute;
      left: -20px;
      top: 4px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--hairline);
      border: 2px solid var(--canvas);
    }
    .timeline-item.active::before { background: var(--primary); }
    .timeline-item.done::before { background: var(--semantic-up); }

    /* 已报名状态：步骤说明 */
    .steps-list { margin-top: 14px; }
    .step-item {
      display: flex;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--hairline-soft);
    }
    .step-item:last-child { border-bottom: none; padding-bottom: 0; }
    .step-item:first-child { padding-top: 0; }
    .step-num {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: var(--primary);
      color: var(--on-primary);
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .step-content .step-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .step-content .step-desc {
      font-size: 13px;
      line-height: 1.5;
      color: var(--body);
    }

    /* 已报名状态：成功提示框 */
    .success-box {
      background: rgba(5,177,105,0.06);
      border: 1px solid rgba(5,177,105,0.2);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-top: 16px;
    }
    .success-box .success-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 600;
      color: var(--semantic-up);
      margin-bottom: 6px;
    }
    .success-box .success-desc {
      font-size: 14px;
      line-height: 1.55;
      color: var(--body);
    }
    .success-box .success-desc strong { color: var(--ink); }

    /* 已报名状态：信息列表 */
    .info-list { margin-top: 12px; }
    .info-list .info-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 14px;
      line-height: 1.6;
      color: var(--body);
      margin-bottom: 8px;
    }
    .info-list .info-item:last-child { margin-bottom: 0; }
    .info-list .info-item .info-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;

      height: 1px;

      color: var(--ink);

    .cta-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 414px;
      background: var(--canvas);
      border-top: 1px solid var(--hairline-soft);
      padding: 12px 20px 24px;
      z-index: 50;
    }
    .cta-button {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: var(--radius-pill);
      background: var(--primary);
      color: var(--on-primary);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;

      background: var(--primary-disabled);
      cursor: not-allowed;
    }
    .cta-button.secondary {
      background: var(--surface-strong);
      color: var(--ink);
    }
    .cta-row {
      display: flex;
      gap: 12px;
    }
    .cta-row .cta-button { flex: 1; }

    /* 辅助文字 */

      font-size: 12px;

      margin-top: 10px;
    }

      padding: 40px 24px;

      font-size: 24px;
      font-weight: 400;
      letter-spacing: -0.5px;

    /* 全局提示 */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      padding: 14px 22px;
      border-radius: var(--radius-lg);
      font-size: 14px;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

      let str = (I18N[currentLang] && I18N[currentLang][key]) || I18N['zh-CN'][key] || key;
      if (vars) {
        str = str.replace(/\{(\w+)\}/g, (m, k) => vars[k] !== undefined ? vars[k] : m);
      }
      return str;
    }

    function renderLangSelector() {
      return `
        <select class="lang-switcher" onchange="changeLanguage(this.value)">

          <option value="en" ${currentLang === 'en' ? 'selected' : ''}>En</option>
        </select>
      `;
    }

    function changeLanguage(lang) {
      if (!I18N[lang]) return;
      currentLang = lang;
      localStorage.setItem('concertLang', lang);
      document.documentElement.lang = lang;
      render();
    }
    window.changeLanguage = changeLanguage;

    function fmtMoney(n) {
      return n.toLocaleString('en-HK');
    }

    function fmtMoneyFull(wan) {
      const n = wan * 10000;
      return 'HKD ' + n.toLocaleString('en-HK', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function assetTierStatus(assetWan) {
      const STANDARD = 10;
      const VIP = 100;
      if (assetWan < STANDARD) {
        return { level: 'none', reached: t('statusNone'), nextLabel: t('tierStandard'), nextThreshold: STANDARD, gap: STANDARD - assetWan };
      } else if (assetWan < VIP) {
        return { level: 'standard', reached: t('tierStandard'), nextLabel: t('tierVip'), nextThreshold: VIP, gap: VIP - assetWan };
      } else {
        return { level: 'vip', reached: t('tierVip'), nextLabel: null, nextThreshold: null, gap: 0 };
      }
    }

    function canSelectTicket(ticketKey, assetWan) {
      if (ticketKey === TICKET.VIP.key) return assetWan >= 100;
      if (ticketKey === TICKET.STANDARD.key) return assetWan >= 10;
      return false;
    }

    function renderEventsList(snapshot, interactive, hint, disabledHint) {
      const tickets = [TICKET.VIP, TICKET.STANDARD];
      return `
        <div class="events-section">
          <div class="events-header">
            <h3>${t('eventsTitle')}</h3>
            <span class="note">${hint ? t(hint) : (interactive ? t('eventsNoteDefault') : t('eventsNoteLocked'))}</span>
          </div>
          ${snapshot.events.map(ev => {
            const isClosed = ev.weeksAway <= 3;
            const selected = interactive && current.selectedEventId === ev.id;
            const statusClass = isClosed ? 'out' : ev.standardStock < 20 ? 'low' : 'ok';
            const statusText = isClosed ? t('stockOut') : ev.standardStock < 20 ? t('stockLow') : t('stockOk');
            return `
              <div class="event-card ${isClosed || !interactive ? 'disabled' : ''} ${selected ? 'selected' : ''}" ${interactive && !isClosed ? `onclick="selectEvent(${ev.id})"` : ''}>
                <div class="event-top">
                  <div>
                    <div class="artist">${ev.artist}</div>
                    <div class="date">${ev.date} · ${ev.venue}</div>
                  </div>
                  <span class="stock ${statusClass}">${statusText}</span>
                </div>
                ${!isClosed ? `
                  <div class="ticket-options">
                    ${tickets.map(tk => {
                      const stock = ev[`${tk.key}Stock`];
                      const soldOut = stock <= 0;
                      const qualified = canSelectTicket(tk.key, snapshot.assetWan);
                      const tkSelected = selected && current.selectedTicket === tk.key;
                      const tkDisabled = soldOut || !qualified || !interactive;
                      const canClick = interactive && !soldOut && qualified;
                      const label = tk.key === 'vip' ? t('ticketVip') : t('ticketStandard');
                      return `
                        <div class="ticket-chip ${tkDisabled ? 'disabled' : ''} ${tkSelected ? 'selected' : ''}" ${canClick ? `onclick="event.stopPropagation(); selectTicket(${ev.id}, '${tk.key}')"` : ''}>
                          <div class="chip-line">
                            <span class="label">${label}</span>
                            <span class="stock-count">${soldOut ? t('soldOut') : t('remaining', { n: stock })}</span>
                          </div>
                          <div class="chip-note">${!interactive ? t(disabledHint || 'ticketNoteLocked') : qualified ? t('ticketNoteQualified') : t('ticketNoteUnqualified')}</div>
                          <div class="chip-price">${t('ticketPriceLabel')} ${tk.price}</div>
                        </div>
                      `;
                    }).join('')}
                  </div>
                ` : ''}
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

            <div class="info-list">
              <div class="info-item">
                <span class="info-icon">📦</span>
                <span class="info-label">${t('infoRecipient')}</span>
                <span class="info-value">${recipient}</span>
              </div>
              <div class="info-item">
                <span class="info-icon">📍</span>
                <span class="info-label">${t('infoAddress')}</span>
                <span class="info-value">${detail}</span>
              </div>
              <div class="info-item">
                <span class="info-icon">📞</span>
                <span class="info-label">${t('infoPhone')}</span>
                <span class="info-value">${dialCode} ${phone}</span>
              </div>
            </div>
            <div style="margin-top:14px; text-align:center;">
              <button class="text-link-btn" onclick="editAddressFromRegistered()">${t('editAddressBtn')}</button>
              <span style="font-size:13px; color:var(--muted);">${t('editDeadline', { date: deadlineDate })}</span>
            </div>
          </div>

          <div class="section-divider">${t('sectionAttendance')}</div>
          <div class="state-card" style="margin-top:0;">
            <div class="info-list">
              <div class="info-item">
                <span class="info-icon">🎫</span>
                <span class="info-value">${t('attendanceTicket')}</span>
              </div>
              <div class="info-item">
                <span class="info-icon">🎁</span>
                <span class="info-value">${t('attendanceGift')}</span>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderStateEnded() {
      return `
        <div class="content" style="padding-top:48px;">
          <div class="state-card review-card">
            <div class="big-emoji">🎉</div>
            <h2>${t('endedTitle')}</h2>
            <p>${t('endedDesc')}</p>
          </div>
          <div class="state-card">
            <div class="state-title">${t('surveyTitle')}</div>
            <div class="state-desc">${t('surveyDesc')}</div>
          </div>
        </div>
      `;
    }

    function renderCta(snapshot) {
      const status = assetTierStatus(snapshot.assetWan);
      const isRegisterState = snapshot.stateCode === STATE.ACCOUNT_NOT_QUALIFIED;
      let cfg;

      if (snapshot.stateCode === STATE.GUEST) {
        cfg = { text: t('ctaLogin'), note: t('ctaNoteLogin'), action: () => showToast(t('toastLogin')) };
      } else if (snapshot.stateCode === STATE.LOGGED_IN_NO_ACCOUNT) {
        cfg = { text: t('ctaOpenAccount'), note: t('ctaNoteOpenAccount'), action: () => showToast(t('toastOpenAccount')) };
      } else if (snapshot.stateCode === STATE.ACCOUNT_NOT_QUALIFIED && status.level === 'none') {
        cfg = { text: t('ctaDeposit'), note: t('ctaNoteDeposit'), action: () => showToast(t('toastDeposit')) };
      } else if (isRegisterState && current.view === 'events') {
        cfg = { text: t('ctaAddress'), note: t('ctaNoteAddress'), action: goToAddressPage };
      } else if (isRegisterState && current.view === 'address') {
        cfg = { text: t('ctaSubmit'), note: t('ctaNoteSubmit'), action: submitAddress, showCancel: false };
      } else if (snapshot.stateCode === STATE.REGISTERED && current.view === 'address') {
        cfg = { text: t('ctaSave'), note: t('ctaNoteSave'), action: submitAddress, showCancel: true };
      } else if (snapshot.stateCode === STATE.REGISTERED) {
        cfg = { text: '', note: '', action: null, showCancel: false };
      } else if (snapshot.stateCode === STATE.ENDED) {
        cfg = { text: '', note: '', action: null, showCancel: false };
      }

      const ctaBar = document.getElementById('ctaBar');

      if ((snapshot.stateCode === STATE.REGISTERED || snapshot.stateCode === STATE.ENDED) && current.view !== 'address') {
        ctaBar.classList.add('hidden');
        page.style.paddingBottom = '24px';
      } else {
        ctaBar.classList.remove('hidden');
        page.style.paddingBottom = '100px';
      }

      mainCta.textContent = cfg.text;
      ctaNote.textContent = cfg.note;
      mainCta.disabled = false;
      mainCta.onclick = cfg.action;

      if (cfg.showCancel) {
        cancelCta.classList.remove('hidden');
        cancelCta.textContent = t('ctaCancel');
        cancelCta.onclick = cancelAddressEdit;
      } else {
        cancelCta.classList.add('hidden');
        cancelCta.onclick = null;
      }

      if (isRegisterState && current.view === 'events' && status.level !== 'none' && (!current.selectedEventId || !current.selectedTicket)) {
        mainCta.disabled = true;
        ctaNote.textContent = t('ctaNoteSelectFirst');
      }
    }

    function goToAddressPage() {
      if (!current.selectedEventId || !current.selectedTicket) {
        showToast(t('toastSelectFirst'));
        return;
      }
      current.view = 'address';
      render();
    }

    function clearFieldErrors() {
      const fields = ['addrRecipient', 'addrCountry', 'addrDetail', 'addrPhone'];
      fields.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.remove('error');
        const err = document.getElementById(id + 'Error');
        if (err) err.textContent = '';
      });
    }

    function setFieldError(id, msg) {
      const el = document.getElementById(id);
      if (el) el.classList.add('error');
      const err = document.getElementById(id + 'Error');
      if (err) err.textContent = msg;
    }

    function validateAddressForm() {
      clearFieldErrors();
      let isValid = true;
      let firstErrorId = null;

      const recipient = document.getElementById('addrRecipient').value.trim();
      const detail = document.getElementById('addrDetail').value.trim();
      const phone = document.getElementById('addrPhone').value.trim();

      if (!recipient) {
        setFieldError('addrRecipient', t('errorRecipient'));
        isValid = false;
        if (!firstErrorId) firstErrorId = 'addrRecipient';
      }

      if (!detail) {
        setFieldError('addrDetail', t('errorAddress'));
        isValid = false;
        if (!firstErrorId) firstErrorId = 'addrDetail';
      }

      if (!phone) {
        setFieldError('addrPhone', t('errorPhone'));
        isValid = false;
        if (!firstErrorId) firstErrorId = 'addrPhone';
      }

      if (firstErrorId) {
        const el = document.getElementById(firstErrorId);
        if (el) el.focus();
      }

      return isValid ? { recipient, detail, phone } : null;
    }

    function submitAddress() {
      const isEditMode = current.stateCode === STATE.REGISTERED;
      if (!isEditMode && (!current.selectedEventId || !current.selectedTicket)) {
        showToast(t('toastSelectFirst'));
        return;
      }

      const validated = validateAddressForm();
      if (!validated) return;

      const country = document.getElementById('addrCountry').value;
      const dialCode = document.getElementById('addrDialCode').value;

      current.address = { recipient: validated.recipient, country, detail: validated.detail, dialCode, phone: validated.phone };
      current.view = 'events';

      if (isEditMode) {
        showToast(t('toastSaveSuccess'));
      } else {
        current.stateCode = STATE.REGISTERED;
        stateSelect.value = String(STATE.REGISTERED);
        showToast(t('toastRegisterSuccess'));
      }
      render();
    }

    // 全局暴露给内联 onclick
    window.goBackToEvents = goBackToEvents;
    window.goBackFromAddress = goBackFromAddress;
    window.editAddressFromRegistered = editAddressFromRegistered;
    window.cancelAddressEdit = cancelAddressEdit;
    window.clearFieldErrors = clearFieldErrors;
    window.onCountryChange = onCountryChange;
    window.autoFillAddress = autoFillAddress;
    window.selectEvent = function(id) {
      if (current.stateCode !== STATE.ACCOUNT_NOT_QUALIFIED) return;
      const ev = EVENTS.find(e => e.id === id);
      if (ev.weeksAway <= 3) return;
      current.selectedEventId = id;
      current.selectedTicket = null;
      render();
    };
    window.selectTicket = function(eventId, ticketKey) {
      if (current.stateCode !== STATE.ACCOUNT_NOT_QUALIFIED) return;
      if (!canSelectTicket(ticketKey, current.assetWan)) return;
      const ev = EVENTS.find(e => e.id === eventId);
      if (ev[`${ticketKey}Stock`] <= 0) return;
      current.selectedEventId = eventId;
      current.selectedTicket = ticketKey;
      render();
    };

    function render() {
      // 已开户且未报名状态，按账户总资产自动判定用户档位
      if (current.stateCode === STATE.ACCOUNT_NOT_QUALIFIED || current.stateCode === STATE.QUALIFIED_NOT_REGISTERED) {
        current.tier = current.assetWan >= 100 ? TIER.VIP : TIER.STANDARD;
      }

      document.title = t('pageTitle');
      const snapshot = buildStateSnapshot(current.stateCode, current.tier, current.assetWan);

      // 更新控制台读数
      const status = assetTierStatus(snapshot.assetWan);
      assetValue.textContent = fmtMoneyFull(snapshot.assetWan);
      const stateName = stateSelect.options[stateSelect.selectedIndex].text.split(' ')[1];
      const tierLabel = snapshot.tier === TIER.VIP ? 'VIP 档客户' : '标准档客户';
      let qualifiedMark;
      if (status.level === 'none') qualifiedMark = '❌ 未达标标准档';
      else if (status.level === 'standard') qualifiedMark = '✅ 已达到标准档，未达标 VIP 档';
      else qualifiedMark = '✅ 已达到 VIP 档';
      stateReadout.innerHTML = `<strong>${stateName}</strong><br>用户层级：${tierLabel}<br>${qualifiedMark}<br>标准档门槛：HKD 100,000.00<br>VIP 档门槛：HKD 1,000,000.00`;

      // 渲染页面主体
      let body = '';
      switch (snapshot.stateCode) {
        case STATE.GUEST: body = renderStateGuest(); break;
        case STATE.LOGGED_IN_NO_ACCOUNT: body = renderStateLoggedInNoAccount(snapshot); break;
        case STATE.ACCOUNT_NOT_QUALIFIED:
          body = current.view === 'address' ? renderAddressPage(snapshot) : renderStateNotQualified(snapshot);
          break;
        case STATE.QUALIFIED_NOT_REGISTERED:
          // 该状态已从控制台移除，保留兼容旧状态码
          body = current.view === 'address' ? renderAddressPage(snapshot) : renderStateQualified(snapshot);
          break;
        case STATE.REGISTERED:
          body = current.view === 'address' ? renderAddressPage(snapshot) : renderStateRegistered(snapshot);
          break;
        case STATE.ENDED: body = renderStateEnded(); break;
      }
      page.innerHTML = current.view === 'address' ? body : renderHeader() + body;

      renderCta(snapshot);
    }

    // 控件事件
    stateSelect.addEventListener('change', e => {
      current.stateCode = parseInt(e.target.value, 10);
      current.view = 'events';
      render();
    });

    assetRange.addEventListener('input', e => {
      current.assetWan = parseInt(e.target.value, 10);
      render();
    });

    // 键盘快捷键：← → 切换状态（跳过已移除的 3）
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
      if (e.key === 'ArrowLeft') {
        current.stateCode = Math.max(0, current.stateCode - 1);
        if (current.stateCode === 3) current.stateCode = 2;
        stateSelect.value = String(current.stateCode);
        render();
      } else if (e.key === 'ArrowRight') {
        current.stateCode = Math.min(5, current.stateCode + 1);
        if (current.stateCode === 3) current.stateCode = 4;
        stateSelect.value = String(current.stateCode);
        render();
      }
    });

    // 初始化
    document.documentElement.lang = currentLang;
    render();
  </script>
</body>
</html>
