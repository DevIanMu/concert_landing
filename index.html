<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>盛夏焕新 · 港乐星夜</title>
<style>
:root{
  --bg:#f5f6f8; --card:#ffffff; --ink:#1a1d26; --ink2:#6b7280; --ink3:#9ca3af;
  --brand:#1b4fd8; --brand2:#3b6ef0; --gold:#c9a35c; --line:#e8eaef;
  --ok:#0d9f6e; --warn:#d9473b; --vip-grad:linear-gradient(135deg,#2b2b3a,#4a3f2a);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
[hidden]{display:none!important}
body{background:#e9ebf0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);font-size:15px;line-height:1.55}
.phone{max-width:420px;margin:0 auto;background:var(--bg);min-height:100vh;position:relative;padding-bottom:88px}
/* ===== demo 专用栏（非产品设计） ===== */
.demo-bar{position:sticky;top:0;z-index:99;background:#fff8e1;border-bottom:1px dashed #d8b93a;padding:8px 12px;font-size:12px;color:#7a6410}
.demo-bar select{margin:4px 0 2px;width:100%;padding:5px 6px;font-size:13px;border:1px solid #d8b93a;border-radius:6px;background:#fff}
/* ===== 导航 ===== */
.nav{height:56px;display:flex;align-items:center;justify-content:center;position:relative;background:var(--card);border-bottom:1px solid var(--line);font-weight:600;font-size:16px}
.nav-back{position:absolute;left:8px;top:50%;transform:translateY(-50%);border:none;background:none;font-size:20px;color:var(--ink);cursor:pointer;padding:4px 10px}
/* ===== KV ===== */
.kv{background:linear-gradient(160deg,#12275e 0%,#1b4fd8 60%,#3b6ef0 100%);color:#fff;padding:34px 20px 30px}
.kv-logo{font-size:11px;letter-spacing:2px;opacity:.75;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.kv-logo .cross{opacity:.6}
.kv h1{font-size:23px;letter-spacing:1px}
.kv p{margin-top:6px;font-size:13px;opacity:.85}
/* ===== 通用卡片与区块 ===== */
.section{padding:14px 14px 0}
.card{background:var(--card);border-radius:14px;padding:16px;box-shadow:0 1px 3px rgba(20,30,60,.05)}
.card + .card{margin-top:12px}
.sec-title{font-size:15px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.muted{color:var(--ink2);font-size:13px}
/* ===== 状态提示卡 ===== */
.status-card{border-radius:14px;padding:16px;background:linear-gradient(135deg,#eef3ff,#f7f9ff);border:1px solid #dfe7fb}
.status-card.warn{background:linear-gradient(135deg,#fdf3f2,#fef9f8);border-color:#f5d9d5}
.status-card h3{font-size:15px;margin-bottom:6px}
/* ===== 场次卡 ===== */
.event-head{display:flex;justify-content:space-between;align-items:flex-start}
.event-artist{font-size:18px;font-weight:700}
.event-meta{margin-top:4px;font-size:13px;color:var(--ink2)}
.deadline-tag{flex-shrink:0;font-size:11px;color:var(--brand);background:#eef3ff;border-radius:8px;padding:4px 8px;text-align:center;line-height:1.4}
/* ===== 票档卡 ===== */
.tier{margin-top:12px;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;position:relative;transition:border-color .15s}
.tier.enabled{cursor:pointer;border-color:var(--brand)}
.tier.enabled:active{background:#f6f8ff}
.tier.disabled{opacity:.62}
.tier.vip{background:var(--vip-grad);color:#f3e9d2;border-color:#6b5a36}
.tier.vip.enabled{border-color:var(--gold)}
.tier.vip .tier-price{color:var(--gold)}
.tier-top{display:flex;justify-content:space-between;align-items:center}
.tier-name{font-weight:700;font-size:15px}
.tier-price{font-weight:700;color:var(--brand);font-size:15px}
.tier-sub{margin-top:3px;font-size:12px;color:var(--ink2)}
.tier.vip .tier-sub{color:#cfc4a8}
.tier-lock{margin-top:8px;font-size:12px;color:var(--warn);display:flex;align-items:center;gap:4px}
.tier.vip .tier-lock{color:#f0b9b2}
.tier-stock{font-size:11px;color:var(--ink3)}
.tier.vip .tier-stock{color:#b3a888}
.tier-cta{margin-top:8px;font-size:12px;font-weight:600;color:var(--brand)}
.tier.vip .tier-cta{color:var(--gold)}
/* ===== 进度卡 ===== */
.pg-tier{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px}
.pg-tier.unlocked{border-color:var(--ok);background:#f2fbf7;cursor:pointer}
.pg-tier.locked{opacity:.75}
.pg-head{display:flex;justify-content:space-between;font-weight:600;font-size:14px}
.pg-badge{font-size:11px;font-weight:600;color:var(--ok);background:#e2f6ee;border-radius:8px;padding:2px 8px}
.pg-badge.grey{color:var(--ink3);background:#eef0f3}
.pg-row{display:flex;justify-content:space-between;font-size:13px;margin-top:8px;color:var(--ink2)}
.pg-row .ok{color:var(--ok);font-weight:600}
.pg-row .gap{color:var(--brand);font-weight:600}
.pg-hint{margin-top:8px;font-size:12px;color:var(--brand)}
.bar{height:6px;border-radius:3px;background:#edf0f4;margin-top:6px;overflow:hidden}
.bar>i{display:block;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--brand),var(--brand2))}
/* ===== 规则面板 ===== */
.rules ol{padding-left:18px;font-size:13px;color:var(--ink2)}
.rules li{margin-bottom:8px}
.rules b{color:var(--ink)}
/* ===== 已报名页 ===== */
.success-hero{text-align:center;padding:22px 10px 14px}
.success-hero .check{width:56px;height:56px;border-radius:50%;background:var(--ok);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.step{display:flex;gap:12px;margin-top:14px}
.step-num{width:24px;height:24px;flex-shrink:0;border-radius:50%;background:var(--brand);color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;font-weight:600}
.step-body b{font-size:14px}
.step-body p{font-size:13px;color:var(--ink2);margin-top:2px}
.info-row{display:flex;justify-content:space-between;font-size:13px;padding:7px 0;border-bottom:1px dashed var(--line)}
.info-row:last-child{border-bottom:none}
.info-row .k{color:var(--ink2)}
.info-row .v{text-align:right;max-width:65%}
.link{color:var(--brand);font-size:13px;cursor:pointer;font-weight:600}
.notice{margin-top:10px;font-size:12px;color:var(--warn);background:#fdf3f2;border-radius:10px;padding:10px 12px;line-height:1.6}
/* ===== 底部 CTA ===== */
.cta-bar{position:absolute;left:0;right:0;bottom:0;padding:12px 14px calc(12px + env(safe-area-inset-bottom));background:rgba(255,255,255,.96);border-top:1px solid var(--line)}
.cta{width:100%;height:48px;border:none;border-radius:24px;background:linear-gradient(90deg,var(--brand),var(--brand2));color:#fff;font-size:16px;font-weight:600;cursor:pointer}
.cta:active{opacity:.9}
.cta.secondary{background:#fff;color:var(--brand);border:1px solid var(--brand)}
/* ===== 地址页 ===== */
.field{margin-top:14px}
.field label{display:block;font-size:13px;color:var(--ink2);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:15px;background:#fff;font-family:inherit}
.field textarea{min-height:76px;resize:vertical}
.field.err input,.field.err select,.field.err textarea{border-color:var(--warn)}
.field .msg{display:none;font-size:12px;color:var(--warn);margin-top:4px}
.field.err .msg{display:block}
.phone-row{display:flex;gap:8px}
.phone-row select{width:108px;flex-shrink:0}
.summary-strip{background:#eef3ff;border-radius:12px;padding:12px 14px;font-size:13px;color:var(--ink2)}
.summary-strip b{color:var(--ink)}
.addr-actions{margin-top:22px}
.addr-actions .hint{text-align:center;font-size:12px;color:var(--ink3);margin-top:8px}
.addr-actions .row{display:flex;gap:10px}
/* ===== Toast ===== */
.toast{position:fixed;left:50%;bottom:110px;transform:translateX(-50%);background:rgba(20,24,38,.92);color:#fff;font-size:13px;padding:10px 18px;border-radius:20px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;max-width:80%;text-align:center}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="phone" id="phone">
  <div class="demo-bar" id="demo-bar"></div>
  <div id="page-main">
    <nav class="nav"><span id="nav-title">活动中心</span></nav>
    <div id="app"></div>
  </div>
  <div id="page-address" hidden>
    <nav class="nav"><button class="nav-back" id="addr-back">‹</button><span id="addr-title"></span></nav>
    <div id="addr-body" style="padding:14px"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
'use strict';
/* ============================================================
 * Demo：云锋有鱼「盛夏焕新 · 港乐星夜」限时优享计划 H5（v2.1）
 * 依据 docs/superpowers/specs/2026-07-17--design-v2-zh-CN.md 实现
 * 仅简体中文；数据为前端 mock，模拟 status + qualification + activity_phase 接口
 * v2.1：新增全局活动阶段「售罄 / 已过报名截止」叠加设计（设计文档 4.6 节）
 * ============================================================ */

// == 基础工具 ==
const $ = (s, el) => (el || document).querySelector(s);
const fmt = n => Number(n).toLocaleString('en-US');
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let toastTimer = null;
function toast(msg){
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}
const demoToast = () => toast('演示环境，未实现真实功能');

// == Mock 数据 ==
const EVENT = {
  artist: '郑允浩（U-Know Yunho）',
  date: '2026-09-26',
  venue: 'Dreamland',
  deadline: '2026-09-05'
};
const STOCK = { vip_total: 10, vip_used: 3, standard_total: 15, standard_used: 6 };
const TIERS = {
  vip:      { name: 'VIP 档', price: '票面 HKD 1,888',    cond: '单日净入资 ≥ 100 万 HKD · 连续 30 天总资产 ≥ 100 万' },
  standard: { name: '标准档', price: '票面 HKD 888–999',  cond: '单日净入资 ≥ 10 万 HKD · 连续 30 天总资产 ≥ 10 万' }
};
// GET /api/concert/status mock：10 个演示场景
// activity_phase 全局活动阶段（v2.1 新增）：not_started / open / closed / ended
const SCENARIOS = [
  { id: '0',          label: '状态 0 · 访客（未登录）',        activity_phase: 'open' },
  { id: '1',          label: '状态 1 · 已登录未开户',          activity_phase: 'open' },
  { id: '2-old',      label: '状态 2 · 老客（8/1 前开户）',    activity_phase: 'open' },
  { id: '2-progress', label: '状态 2 · 新客未达标',            activity_phase: 'open' },
  { id: '2-standard', label: '状态 2 · 已达标标准档',          activity_phase: 'open' },
  { id: '2-vip',      label: '状态 2 · 已达标 VIP 档',         activity_phase: 'open' },
  { id: '2-soldout',  label: '状态 2 · 已达标 · 全部售罄',     activity_phase: 'open',
    stock: { vip_total: 10, vip_used: 10, standard_total: 15, standard_used: 15 } },
  { id: '2-closed',   label: '状态 2 · 已达标 · 已过报名截止', activity_phase: 'closed' },
  { id: '4',          label: '状态 4 · 已报名',                activity_phase: 'open' },
  { id: '5',          label: '状态 5 · 已结束',                activity_phase: 'open' }
];
const QUAL = {
  '2-old':      { is_new_customer: false },
  '2-progress': {
    is_new_customer: true,
    standard: { net_inflow_qualified: false, net_inflow_gap: 42000,  holding_days: 9, qualified: false },
    vip:      { net_inflow_qualified: false, net_inflow_gap: 942000, holding_days: 0, qualified: false }
  },
  '2-standard': {
    is_new_customer: true,
    standard: { net_inflow_qualified: true,  net_inflow_gap: 0,      holding_days: 30, qualified: true },
    vip:      { net_inflow_qualified: false, net_inflow_gap: 500000, holding_days: 12, qualified: false }
  },
  '2-vip': {
    is_new_customer: true,
    standard: { net_inflow_qualified: true,  net_inflow_gap: 0,      holding_days: 30, qualified: true },
    vip:      { net_inflow_qualified: true,  net_inflow_gap: 0,      holding_days: 30, qualified: true }
  }
};
// v2.1：「全部售罄」「已过报名截止」场景的资格数据复用「已达标标准档」
QUAL['2-soldout'] = QUAL['2-standard'];
QUAL['2-closed']  = QUAL['2-standard'];
const DEFAULT_REG = {
  ticket_type: 'standard', name: '张三', region: '中国香港',
  address: '九龙尖沙咀弥敦道 100 号 8 楼 801 室', phone_code: '+852', phone: '9123 4567'
};

// == 运行时状态 ==
let scene = '0';                 // 当前演示场景
let registration = null;         // 报名成功后写入 {ticket_type, name, region, address, phone_code, phone}
let selectedTier = null;         // 地址页所选手档 'vip' | 'standard'
let addressMode = 'register';    // 'register' | 'edit'
const currentReg = () => registration || DEFAULT_REG;

// == Demo 专用栏（非产品设计） ==
function renderDemoBar(){
  $('#demo-bar').innerHTML =
    'Demo 场景切换（仅演示用途 · 非产品设计）' +
    '<select id="demo-scene">' +
    SCENARIOS.map(s => `<option value="${s.id}"${s.id === scene ? ' selected' : ''}>${s.label}</option>`).join('') +
    '</select>';
  $('#demo-scene').addEventListener('change', e => {
    scene = e.target.value;
    closeAddress();
    renderMain();
  });
}

// == 通用组件 ==
function kv(){
  return `<div class="kv">
    <div class="kv-logo">云锋 <span class="cross">×</span> OFFGRID</div>
    <h1>盛夏焕新 · 港乐星夜</h1>
    <p>${EVENT.artist} · ${EVENT.date} · ${EVENT.venue}</p>
    <p>新客专享 · 双档门票权益 · 报名截止 ${EVENT.deadline}</p>
  </div>`;
}
function rulesPanel(){
  return `<div class="section"><div class="card rules">
    <div class="sec-title">活动规则</div>
    <ol>
      <li>活动仅限 2026 年 8 月 1 日起完成开户的客户参与，每人限报名 1 张，名额先到先得，报完即止。</li>
      <li>标准档：活动期间单日净入资 ≥ 10 万 HKD（含现金及股票转仓），且连续 30 个自然日账户总资产 ≥ 10 万 HKD。</li>
      <li>VIP 档：活动期间单日净入资 ≥ 100 万 HKD（含现金及股票转仓），且连续 30 个自然日账户总资产 ≥ 100 万 HKD；VIP 档客户可降级选择标准档。</li>
      <li>报名成功后，工作人员将于寄票前核实您自开户日起的活动期间交易手数（标准档 ≥ 5 手，VIP 档 ≥ 10 手，全市场交易合计）。核实通过后，门票将于演出前 7-10 天寄出，寄出时您将收到邮件通知。</li>
      <li><b>若交易手数未满足上述要求，将不予寄票</b>，核实结果将以邮件通知。</li>
      <li>收件信息可于报名截止日（2026-09-05）前修改。</li>
    </ol>
  </div></div>`;
}
// v2.1 全局阶段 mock 取值：当前场景的 activity_phase 与库存（场景未覆盖库存时用默认 STOCK）
const curScenario  = () => SCENARIOS.find(s => s.id === scene) || {};
const activityPhase = () => curScenario().activity_phase || 'open';
const tierStock = tier => {
  const st = curScenario().stock || STOCK;
  return { total: st[tier + '_total'], used: st[tier + '_used'] };
};
const tierRemaining = tier => { const s = tierStock(tier); return s.total - s.used; };
const allSoldOut = () => tierRemaining('vip') <= 0 && tierRemaining('standard') <= 0;
function stockLine(tier){
  const s = tierStock(tier), left = s.total - s.used;
  return left <= 0 ? '剩余 0 张' : `剩余 ${left} / ${s.total}`;
}
// 票档卡：enabled=true 时可点击报名；否则展示 lockText
// v2.1 禁用原因优先级（同时命中只显示一个）：报名已截止 > 已售罄 > 仅限新客 > 未达标
function tierCard(tier, enabled, lockText){
  const t = TIERS[tier];
  if (activityPhase() === 'closed'){ enabled = false; lockText = '报名已截止'; }
  else if (tierRemaining(tier) <= 0){ enabled = false; lockText = '已售罄'; }
  return `<div class="tier ${tier} ${enabled ? 'enabled' : 'disabled'}" data-tier="${tier}" data-enabled="${enabled ? 1 : 0}" data-lock="${esc(lockText || '')}">
    <div class="tier-top">
      <span class="tier-name">${t.name}</span>
      <span class="tier-price">${t.price}</span>
    </div>
    <div class="tier-sub">${t.cond}</div>
    <div class="tier-stock">${stockLine(tier)} · 先到先得</div>
    ${enabled ? '<div class="tier-cta">点击报名 ›</div>' : (lockText ? `<div class="tier-lock">🔒 ${lockText}</div>` : '')}
  </div>`;
}
// v2.1 全局阶段提示卡：已过报名截止 / 全部售罄（状态 0/1/2 未报名页展示于场次卡上方；无 CTA、无候补入口）
function phaseNotice(){
  if (activityPhase() === 'closed')
    return `<div class="section"><div class="status-card"><h3>报名已于 2026年9月5日 截止</h3></div></div>`;
  if (allSoldOut())
    return `<div class="section"><div class="status-card"><h3>本场次名额已全部报满，感谢关注</h3></div></div>`;
  return '';
}
function eventCard(tierHtml){
  return `${phaseNotice()}<div class="section"><div class="card">
    <div class="event-head">
      <div>
        <div class="event-artist">${EVENT.artist}</div>
        <div class="event-meta">${EVENT.date} · ${EVENT.venue}</div>
      </div>
      <div class="deadline-tag">报名截止<br>${EVENT.deadline}</div>
    </div>
    ${tierHtml}
  </div></div>`;
}
function ctaBar(label, id){
  return `<div class="cta-bar"><button class="cta" id="${id}">${label}</button></div>`;
}
// 双档资格进度卡（状态 2 核心 UI）
function qualCards(qual){
  const one = (tier, q) => {
    const threshold = tier === 'vip' ? '100 万' : '10 万';
    const pct = Math.min(100, Math.round(q.holding_days / 30 * 100));
    const inflow = q.net_inflow_qualified
      ? '<span class="ok">✅ 已达标</span>'
      : `<span class="gap">还差 HKD ${fmt(q.net_inflow_gap)}</span>`;
    const badge = q.qualified
      ? '<span class="pg-badge">可报名</span>'
      : '<span class="pg-badge grey">未达标</span>';
    const hint = (tier === 'vip' && !q.qualified && qual.standard.qualified)
      ? '<div class="pg-hint">继续提升资产可解锁 VIP 档</div>' : '';
    return `<div class="pg-tier ${q.qualified ? 'unlocked' : 'locked'}" data-pgtier="${tier}" data-qualified="${q.qualified ? 1 : 0}">
      <div class="pg-head"><span>${TIERS[tier].name}</span>${badge}</div>
      <div class="pg-row"><span>单日净入资 ≥ ${threshold} HKD</span>${inflow}</div>
      <div class="pg-row"><span>连续持有（≥ ${threshold}）</span><span>${q.holding_days} / 30 天</span></div>
      <div class="bar"><i style="width:${pct}%"></i></div>
      ${hint}
    </div>`;
  };
  return `<div class="section"><div class="card">
    <div class="sec-title">我的报名资格</div>
    ${one('standard', qual.standard)}
    ${one('vip', qual.vip)}
  </div></div>`;
}

// == 各状态页面 ==
function pageGuest(){
  return kv()
    + eventCard(tierCard('vip', false, '登录后可报名') + tierCard('standard', false, '登录后可报名'))
    + rulesPanel()
    + ctaBar('登录 / 注册', 'cta-login');
}
function pageNoAccount(){
  return kv()
    + `<div class="section"><div class="status-card">
        <h3>您尚未完成开户，无法报名</h3>
        <div class="muted">完成开户并达到对应档位要求后，即可报名领取门票权益。</div>
      </div></div>`
    + eventCard(tierCard('vip', false, '完成开户并达标后可选') + tierCard('standard', false, '完成开户并达标后可选'))
    + rulesPanel()
    + ctaBar('前往开户', 'cta-open');
}
function pageOpenedOld(){
  return kv()
    + `<div class="section"><div class="status-card warn">
        <h3>本活动仅限 2026 年 8 月 1 日起开户成功的客户参与</h3>
        <div class="muted">您可浏览活动内容，但无法参与报名。</div>
      </div></div>`
    + eventCard(tierCard('vip', false, '仅限新开户客户参与') + tierCard('standard', false, '仅限新开户客户参与'))
    + rulesPanel();
}
function pageOpened(qual){
  const closed = activityPhase() === 'closed';
  const stdOk = qual.standard.qualified, vipOk = qual.vip.qualified;
  let html = kv();
  if (!closed) html += qualCards(qual);   // v2.1：过截止后不再展示资格进度卡（截止后达标无意义）
  html += eventCard(
    tierCard('vip', vipOk, vipOk ? '' : '未达标')
    + tierCard('standard', stdOk || vipOk, (stdOk || vipOk) ? '' : '达标后可选')
  );
  html += rulesPanel();
  if (!vipOk && !closed && !allSoldOut()) html += ctaBar('继续入金', 'cta-deposit');   // v2.1：过截止 / 全部售罄时无 CTA
  return html;
}
function pageBooked(){
  const reg = currentReg();
  const tier = TIERS[reg.ticket_type];
  return kv()
    + `<div class="section"><div class="card">
        <div class="success-hero">
          <div class="check">✓</div>
          <h3>报名成功</h3>
          <div class="muted">您的门票已确认预留</div>
          <div class="muted" style="margin-top:6px">${EVENT.artist} · ${EVENT.date} · ${EVENT.venue} · ${tier.name}</div>
        </div>
      </div>
      <div class="card">
        <div class="sec-title">接下来会发生什么</div>
        <div class="step"><div class="step-num">1</div><div class="step-body">
          <b>门票制作</b><p>报名成功后，我们将统一安排门票制作。</p>
        </div></div>
        <div class="step"><div class="step-num">2</div><div class="step-body">
          <b>寄送门票</b><p>制作完成后，门票将于演出前 7-10 天寄出，寄出时您将收到邮件通知。寄票前我们将核实您在活动期间的交易手数（标准档 ≥ 5 手 / VIP 档 ≥ 10 手），核实通过后安排寄出。</p>
        </div></div>
        <div class="step"><div class="step-num">3</div><div class="step-body">
          <b>签收门票</b><p>请保持手机畅通，及时签收。</p>
        </div></div>
        <div class="notice">若交易手数未满足要求，将不予寄票，核实结果将以邮件通知。</div>
      </div>
      <div class="card">
        <div class="sec-title">收件信息</div>
        <div class="info-row"><span class="k">收件人</span><span class="v">${esc(reg.name)}</span></div>
        <div class="info-row"><span class="k">地址</span><span class="v">${esc(reg.region)} ${esc(reg.address)}</span></div>
        <div class="info-row"><span class="k">电话</span><span class="v">${esc(reg.phone_code)} ${esc(reg.phone)}</span></div>
        ${activityPhase() === 'closed' ? '' : '<div style="margin-top:10px"><span class="link" id="edit-addr">修改收件信息</span> <span class="muted">（报名截止日前可修改）</span></div>'}
      </div>
      <div class="card">
        <div class="sec-title">到场须知</div>
        <div class="muted">🎫 请携带实体门票入场。</div>
        <div class="muted" style="margin-top:6px">🎁 现场设有云锋有鱼专属应援礼包领取点。</div>
      </div></div>`;
}
function pageEnded(){
  return kv()
    + `<div class="section"><div class="card">
        <div class="success-hero">
          <div class="check" style="background:var(--brand)">★</div>
          <h3>活动已圆满结束</h3>
          <div class="muted">感谢您的参与，期待与您再次相见。</div>
          <div class="muted" style="margin-top:6px">${EVENT.artist} · ${EVENT.date} · ${EVENT.venue}</div>
        </div>
      </div>
      <div class="card" style="text-align:center">
        <div class="muted" style="margin-bottom:10px">邀请您花 1 分钟完成满意度问卷，帮助我们做得更好。</div>
        <button class="cta secondary" id="cta-survey">填写满意度问卷</button>
      </div></div>`;
}

// == 主渲染 ==
function renderMain(){
  $('#page-address').hidden = true;
  $('#page-main').hidden = false;
  let html = '';
  if (scene === '0') html = pageGuest();
  else if (scene === '1') html = pageNoAccount();
  else if (scene === '2-old') html = pageOpenedOld();
  else if (scene === '2-progress' || scene === '2-standard' || scene === '2-vip' || scene === '2-soldout' || scene === '2-closed') html = pageOpened(QUAL[scene]);
  else if (scene === '4') html = pageBooked();
  else if (scene === '5') html = pageEnded();
  $('#app').innerHTML = html;
  bindMain();
  window.scrollTo(0, 0);
}
function bindMain(){
  // 演示占位按钮
  ['cta-login', 'cta-open', 'cta-deposit', 'cta-survey'].forEach(id => {
    const b = $('#' + id);
    if (b) b.addEventListener('click', demoToast);
  });
  // 票档卡点击：可报名 → 地址页；置灰 → toast 原因
  document.querySelectorAll('.tier').forEach(el => {
    el.addEventListener('click', () => {
      if (el.dataset.enabled === '1') openAddress('register', el.dataset.tier);
      else toast(el.dataset.lock || '当前不可报名');
    });
  });
  // 已达标进度卡点击 → 地址页（与票档卡等效入口；v2.1：过截止 / 已售罄时拦截）
  document.querySelectorAll('.pg-tier.unlocked').forEach(el => {
    el.addEventListener('click', () => {
      if (activityPhase() === 'closed') return toast('报名已截止');
      if (tierRemaining(el.dataset.pgtier) <= 0) return toast('已售罄');
      openAddress('register', el.dataset.pgtier);
    });
  });
  // 已报名页：修改收件信息
  const edit = $('#edit-addr');
  if (edit) edit.addEventListener('click', () => openAddress('edit', currentReg().ticket_type));
}

// == 地址页 ==
function openAddress(mode, tier){
  addressMode = mode;
  selectedTier = tier;
  $('#page-main').hidden = true;
  $('#page-address').hidden = false;
  $('#addr-title').textContent = mode === 'edit' ? '修改收件信息' : '填写寄票地址';
  renderAddressForm();
  window.scrollTo(0, 0);
}
function closeAddress(){
  $('#page-address').hidden = true;
  $('#page-main').hidden = false;
  window.scrollTo(0, 0);
}
function renderAddressForm(){
  const t = TIERS[selectedTier];
  const reg = addressMode === 'edit' ? currentReg() : { name: '', region: '', address: '', phone_code: '+852', phone: '' };
  const regions = ['中国大陆', '中国香港', '中国澳门', '中国台湾', '新加坡', '其他'];
  const codes = ['+86', '+852', '+853', '+886', '+65'];
  $('#addr-body').innerHTML = `
    <div class="summary-strip">已选 <b>${EVENT.artist} · ${EVENT.date} · ${EVENT.venue}</b><br>${t.name} · ${t.price}</div>
    <div class="field" id="fw-name">
      <label>收件人姓名 *</label>
      <input id="f-name" type="text" placeholder="请输入收件人姓名" value="${esc(reg.name)}">
      <div class="msg">请输入收件人姓名</div>
    </div>
    <div class="field" id="fw-region">
      <label>国家 / 地区 *</label>
      <select id="f-region">
        <option value="">请选择</option>
        ${regions.map(r => `<option${r === reg.region ? ' selected' : ''}>${r}</option>`).join('')}
      </select>
      <div class="msg">请选择国家 / 地区</div>
    </div>
    <div class="field" id="fw-addr">
      <label>详细地址 *</label>
      <textarea id="f-addr" placeholder="请输入详细地址">${esc(reg.address)}</textarea>
      <div class="msg">详细地址不能为空</div>
    </div>
    <div class="field" id="fw-phone">
      <label>联系电话 *</label>
      <div class="phone-row">
        <select id="f-code">${codes.map(c => `<option${c === reg.phone_code ? ' selected' : ''}>${c}</option>`).join('')}</select>
        <input id="f-phone" type="tel" placeholder="请输入手机号码" value="${esc(reg.phone)}">
      </div>
      <div class="msg">请输入手机号码</div>
    </div>
    <div class="addr-actions">
      ${addressMode === 'edit'
        ? '<div class="row"><button class="cta secondary" id="addr-cancel" style="flex:1">取消</button><button class="cta" id="addr-submit" style="flex:2">保存</button></div><div class="hint">保存后将更新收件信息</div>'
        : '<button class="cta" id="addr-submit">确认提交</button><div class="hint">提交后将锁定名额</div>'}
    </div>`;
  // 输入时清除错误态
  ['f-name', 'f-region', 'f-addr', 'f-phone'].forEach(id => {
    $('#' + id).addEventListener('input', e => e.target.closest('.field').classList.remove('err'));
  });
  const cancel = $('#addr-cancel');
  if (cancel) cancel.addEventListener('click', closeAddress);
  $('#addr-submit').addEventListener('click', submitAddress);
}
function submitAddress(){
  const checks = [
    { wrap: 'fw-name',  ok: $('#f-name').value.trim() !== '',  focus: 'f-name' },
    { wrap: 'fw-region', ok: $('#f-region').value !== '',      focus: 'f-region' },
    { wrap: 'fw-addr',  ok: $('#f-addr').value.trim() !== '',  focus: 'f-addr' },
    { wrap: 'fw-phone', ok: $('#f-phone').value.trim() !== '', focus: 'f-phone' }
  ];
  let firstBad = null;
  checks.forEach(c => {
    $('#' + c.wrap).classList.toggle('err', !c.ok);
    if (!c.ok && !firstBad) firstBad = c.focus;
  });
  if (firstBad){ $('#' + firstBad).focus(); return; }
  const data = {
    ticket_type: selectedTier,
    name: $('#f-name').value.trim(),
    region: $('#f-region').value,
    address: $('#f-addr').value.trim(),
    phone_code: $('#f-code').value,
    phone: $('#f-phone').value.trim()
  };
  if (addressMode === 'edit'){
    registration = data;
    closeAddress();
    renderMain();
    toast('收件信息已保存');
  } else {
    registration = data;
    STOCK[selectedTier + '_used'] += 1;   // mock 扣减库存
    scene = '4';
    renderDemoBar();                      // demo 栏同步切到「状态 4 · 已报名」
    closeAddress();
    renderMain();
    toast('报名成功');
  }
}

// == 启动 ==
$('#addr-back').addEventListener('click', closeAddress);
renderDemoBar();
renderMain();
</script>
</body>
</html>
